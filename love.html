<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สำหรับคนพิเศษ 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
}

.card{
width:90%;
max-width:650px;
background:white;
padding:40px;
border-radius:35px;
text-align:center;
box-shadow:0 15px 40px rgba(255,105,180,.35);
z-index:10;
position:relative;
}

.character{
font-size:100px;
animation:bounce 2s infinite;
}

@keyframes bounce{
50%{transform:translateY(-10px);}
}

h1{
color:#ff4d9d;
margin:10px 0;
}

#question{
font-size:24px;
margin:20px 0;
color:#444;
}

.buttons{
margin-top:25px;
}

button{
border:none;
padding:15px 35px;
border-radius:50px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.yes{
background:#ff66b3;
color:white;
}

.yes:hover{
transform:scale(1.1);
}

.no{
background:#dcdcdc;
position:fixed;
}

#result{
margin-top:25px;
font-size:26px;
font-weight:bold;
color:#ff1493;
}

.heart{
position:fixed;
font-size:24px;
pointer-events:none;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-100vh) scale(1.8);
opacity:0;
}
}

.final{
font-size:40px;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.1);
}
}

.counter{
margin-top:10px;
color:#888;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<div class="character">🎀🐽💖</div>

<h1>มีอะไรจะถามหน่อย</h1>

<div id="question">
รักเค้ามั้ย? 🥺
</div>

<div class="buttons">
<button class="yes" onclick="nextQuestion()">
รักสิ 💕
</button>
</div>

<div id="result"></div>

<div class="counter">
พยายามกดไม่รัก: <span id="count">0</span> ครั้ง
</div>

</div>

<button class="no" id="noBtn">
ไม่รัก 😝
</button>

<script>

let stage=0;
let failCount=0;

const questions=[
"รักเค้ามั้ย? 🥺",
"รักจริงหรือเปล่าาา 💕",
"แน่ใจนะว่ารัก 🥰",
"รักมากแค่ไหน 😳",
"รักตลอดไปไหม 💍"
];

function nextQuestion(){

stage++;

if(stage<questions.length){
document.getElementById("question").innerHTML=
questions[stage];
}
else{
showFinal();
}

createBurst();
}

function showFinal(){

document.querySelector(".buttons").style.display="none";

document.getElementById("question").innerHTML=
`<div class="final">
💖 เค้าก็รักเธอที่สุดเลย 💖
<br><br>
ขอบคุณที่อยู่ด้วยกันนะ 🥰
</div>`;

setInterval(createBurst,500);

}

const noBtn=document.getElementById("noBtn");

function moveButton(){

failCount++;

document.getElementById("count").innerText=
failCount;

const x=Math.random()*(window.innerWidth-150);
const y=Math.random()*(window.innerHeight-100);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

moveButton();

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

const hearts=[
"💖","💕","💗","💓","💘",
"💝","🌸","🎀","💞"
];

heart.innerHTML=
hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.bottom="-30px";

heart.style.animationDuration=
(Math.random()*4+4)+"s";

heart.style.fontSize=
(Math.random()*25+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,250);

function createBurst(){

for(let i=0;i<25;i++){

setTimeout(()=>{
createHeart();
},i*50);

}

}

</script>

</body>
</html>
